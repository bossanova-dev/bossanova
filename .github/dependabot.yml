version: 2
updates:
  # Go modules
  - package-ecosystem: gomod
    directory: /lib/bossalib
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(bossalib)"
      include: scope
    labels:
      - dependencies
      - go

  - package-ecosystem: gomod
    directory: /plugins/bossd-plugin-dependabot
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(plugin-dependabot)"
      include: scope
    labels:
      - dependencies
      - go

