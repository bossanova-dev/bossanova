name: CI

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubicloud
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: go.work.sum

      - uses: bufbuild/buf-setup-action@v1

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin

      - name: Lint
        run: make lint-proto lint-bossalib lint-boss lint-bossd lint-bosso lint-autopilot lint-dependabot lint-linear lint-repair

      - name: Test
        run: make test-bossalib test-boss test-bossd test-bosso test-autopilot test-dependabot test-linear test-repair

      - name: Build
        run: make build-boss build-bossd build-bosso build-autopilot build-dependabot build-linear build-repair
