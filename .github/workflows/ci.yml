name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: bufbuild/buf-setup-action@v1

      - name: Buf lint
        run: buf lint

      - name: golangci-lint (bossalib)
        uses: golangci/golangci-lint-action@v8
        with:
          working-directory: lib/bossalib

      - name: golangci-lint (boss)
        uses: golangci/golangci-lint-action@v8
        with:
          working-directory: services/boss

      - name: golangci-lint (bossd)
        uses: golangci/golangci-lint-action@v8
        with:
          working-directory: services/bossd

      - name: golangci-lint (bosso)
        uses: golangci/golangci-lint-action@v8
        with:
          working-directory: services/bosso

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Test all modules
        run: |
          for mod in lib/bossalib services/boss services/bossd services/bosso; do
            echo "==> Testing $mod"
            (cd "$mod" && go test ./...)
          done

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build all binaries
        run: make build
