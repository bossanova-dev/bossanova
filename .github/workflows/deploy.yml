# DEPRECATED: Replaced by perform-production-release.yml. Remove after v1.0.0 ships.
name: Deploy

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  deploy-bosso:
    runs-on: ubicloud

    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-buildx-action@v3

    - name: Log in to Fly registry
      uses: docker/login-action@v3
      with:
        registry: registry.fly.io
        username: x
        password: ${{ secrets.FLY_API_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: services/bosso/Dockerfile
        push: true
        tags: registry.fly.io/bosso:${{ github.ref_name }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - uses: superfly/flyctl-actions/setup-flyctl@master

    - name: Deploy to Fly.io
      run: flyctl deploy --image registry.fly.io/bosso:${{ github.ref_name }} --config services/bosso/fly.toml
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    runs-on: ubicloud

    defaults:
      run:
        working-directory: services/web

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "npm"
        cache-dependency-path: services/web/package-lock.json

    - name: Install
      run: npm ci

    - name: Build
      run: npm run build

    - name: Deploy to Cloudflare Pages
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        command: pages deploy dist --project-name=bossanova-web --branch=main
        workingDirectory: services/web

  build:
    runs-on: ubicloud
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Copy skills for embedding
        run: make copy-skills

      - name: Build boss
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          LDFLAGS="-s -w -X github.com/recurser/bossalib/buildinfo.Version=${VERSION} -X github.com/recurser/bossalib/buildinfo.Commit=${COMMIT} -X github.com/recurser/bossalib/buildinfo.Date=${DATE}"
          go build -ldflags "${LDFLAGS}" -o "boss-${{ matrix.goos }}-${{ matrix.goarch }}" ./services/boss/cmd

      - name: Build bossd
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          LDFLAGS="-s -w -X github.com/recurser/bossalib/buildinfo.Version=${VERSION} -X github.com/recurser/bossalib/buildinfo.Commit=${COMMIT} -X github.com/recurser/bossalib/buildinfo.Date=${DATE}"
          go build -ldflags "${LDFLAGS}" -o "bossd-${{ matrix.goos }}-${{ matrix.goarch }}" ./services/bossd/cmd

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            boss-${{ matrix.goos }}-${{ matrix.goarch }}
            bossd-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubicloud
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  bump-versions:
    needs: deploy-bosso
    runs-on: ubicloud

    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Update bosso image tag
      run: |
        TAG="${GITHUB_REF_NAME}"
        sed -i "s|bosso_image *= *\"registry.fly.io/bosso[^\"]*\"|bosso_image = \"registry.fly.io/bosso:${TAG}\"|g" infra/environments/main.tf
        sed -i "s|bosso_image *= *\"registry.fly.io/bosso-staging[^\"]*\"|bosso_image = \"registry.fly.io/bosso-staging:${TAG}\"|g" infra/environments/main.tf

    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add infra/environments/main.tf
        git diff --staged --quiet && exit 0
        git commit -m "chore: bump bosso image to ${GITHUB_REF_NAME} [skip ci]"
        git push
