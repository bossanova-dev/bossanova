name: Mirror to Public Repo

on:
  push:
    branches:
      - production

concurrency:
  group: production-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubicloud
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Remove private directories
        run: |
          # Remove private services, infrastructure, and internal docs
          rm -rf plugins/
          rm -rf services/bosso/
          rm -rf web/
          rm -rf docs/
          rm -rf TODOS.md
          rm -rf .github/workflows/
          rm -rf .releaserc.yml
          rm -rf .beads/
          rm -rf .claude/
          rm -rf .husky/
          rm -rf infra/

          # Create a minimal .github/workflows/ for public repo
          # (This will be empty for now - public CI added later)
          mkdir -p .github/workflows/

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit stripped version
        run: |
          git add -A
          git commit -m "chore: strip private directories for public mirror [skip ci]" || echo "No changes to commit"

      - name: Push to public repo
        env:
          BOSSANOVA_PUBLIC_DEPLOY_KEY: ${{ secrets.BOSSANOVA_PUBLIC_DEPLOY_KEY }}
        run: |
          git remote add public https://x-access-token:${BOSSANOVA_PUBLIC_DEPLOY_KEY}@github.com/bossanova-dev/bossanova.git
          git push public HEAD:main --force
