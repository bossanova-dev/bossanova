name: Perform Production Release

on:
  push:
    branches:
      - production

concurrency:
  group: production-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    runs-on: ubicloud
    outputs:
      version: ${{ steps.semantic.outputs.new_release_version }}
      released: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install semantic-release
        run: |
          npm install --save-dev \
            semantic-release@^24 \
            @semantic-release/commit-analyzer@^14 \
            @semantic-release/release-notes-generator@^14 \
            @semantic-release/changelog@^6 \
            @semantic-release/git@^10 \
            @semantic-release/exec@^7 \
            conventional-changelog-conventionalcommits@^8

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  build:
    needs: version
    if: needs.version.outputs.released == 'true'
    runs-on: ubicloud
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: go.work.sum

      - name: Copy skills for embedding
        run: make copy-skills

      - name: Build boss
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="v${{ needs.version.outputs.version }}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          LDFLAGS="-s -w -X github.com/recurser/bossalib/buildinfo.Version=${VERSION} -X github.com/recurser/bossalib/buildinfo.Commit=${COMMIT} -X github.com/recurser/bossalib/buildinfo.Date=${DATE}"
          go build -ldflags "${LDFLAGS}" -o "boss-${{ matrix.goos }}-${{ matrix.goarch }}" ./services/boss/cmd

      - name: Build bossd
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="v${{ needs.version.outputs.version }}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          LDFLAGS="-s -w -X github.com/recurser/bossalib/buildinfo.Version=${VERSION} -X github.com/recurser/bossalib/buildinfo.Commit=${COMMIT} -X github.com/recurser/bossalib/buildinfo.Date=${DATE}"
          go build -ldflags "${LDFLAGS}" -o "bossd-${{ matrix.goos }}-${{ matrix.goarch }}" ./services/bossd/cmd

      - name: Build plugins
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="v${{ needs.version.outputs.version }}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          LDFLAGS="-s -w -X github.com/recurser/bossalib/buildinfo.Version=${VERSION} -X github.com/recurser/bossalib/buildinfo.Commit=${COMMIT} -X github.com/recurser/bossalib/buildinfo.Date=${DATE}"

          for plugin in bossd-plugin-autopilot bossd-plugin-dependabot bossd-plugin-repair; do
            echo "Building ${plugin} for ${{ matrix.goos }}/${{ matrix.goarch }}"
            go build -ldflags "${LDFLAGS}" -o "${plugin}-${{ matrix.goos }}-${{ matrix.goarch }}" ./plugins/${plugin}
          done

      - uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            boss-${{ matrix.goos }}-${{ matrix.goarch }}
            bossd-${{ matrix.goos }}-${{ matrix.goarch }}
            bossd-plugin-*-${{ matrix.goos }}-${{ matrix.goarch }}

  notarize:
    needs: [version, build]
    if: needs.version.outputs.released == 'true'
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Check signing configuration
        id: check
        env:
          APPLE_DEVELOPER_CERTIFICATE_P12: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12 }}
        run: |
          if [ -z "${APPLE_DEVELOPER_CERTIFICATE_P12}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Apple signing not configured — skipping notarization"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.configured == 'true'

      - uses: actions/download-artifact@v8
        if: steps.check.outputs.configured == 'true'
        with:
          name: binaries-darwin-${{ matrix.goarch }}
          path: artifacts

      - name: Import Developer ID Certificate
        if: steps.check.outputs.configured == 'true'
        env:
          APPLE_DEVELOPER_CERTIFICATE_P12: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12 }}
          APPLE_DEVELOPER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          # Import certificate
          echo "${APPLE_DEVELOPER_CERTIFICATE_P12}" | base64 --decode > certificate.p12
          security import certificate.p12 -k "${KEYCHAIN_PATH}" -P "${APPLE_DEVELOPER_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          rm certificate.p12

          # Set keychain as default
          security list-keychain -d user -s "${KEYCHAIN_PATH}"

      - name: Sign binaries
        if: steps.check.outputs.configured == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          # APPLE_SIGNING_IDENTITY should be the full certificate name, e.g.:
          # "Developer ID Application: Company Name (TEAMID)"
          for binary in artifacts/*; do
            echo "Signing ${binary}"
            codesign --force --sign "${APPLE_SIGNING_IDENTITY}" --timestamp --options runtime "${binary}"
            codesign --verify --verbose "${binary}"
          done

      - name: Create zip for notarization
        if: steps.check.outputs.configured == 'true'
        run: |
          cd artifacts
          zip -r ../binaries-darwin-${{ matrix.goarch }}.zip *

      - name: Notarize binaries
        if: steps.check.outputs.configured == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        timeout-minutes: 30
        run: |
          xcrun notarytool submit binaries-darwin-${{ matrix.goarch }}.zip \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait --timeout 20m

      - name: Staple notarization ticket
        if: steps.check.outputs.configured == 'true'
        run: |
          unzip -o binaries-darwin-${{ matrix.goarch }}.zip -d artifacts-stapled
          for binary in artifacts-stapled/*; do
            echo "Stapling ${binary}"
            xcrun stapler staple "${binary}" || echo "Stapling failed for ${binary} (may not be required)"
          done

      - uses: actions/upload-artifact@v7
        if: steps.check.outputs.configured == 'true'
        with:
          name: binaries-darwin-${{ matrix.goarch }}-signed
          path: artifacts-stapled/*
          overwrite: true

  release:
    needs: [version, build, notarize]
    if: always() && needs.version.outputs.released == 'true' && needs.build.result == 'success'
    runs-on: ubicloud
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v8
        with:
          path: artifacts-all

      - name: Organize artifacts
        run: |
          mkdir -p artifacts

          # Copy signed darwin binaries, warn if falling back to unsigned
          if [ -d artifacts-all/binaries-darwin-amd64-signed ]; then
            cp artifacts-all/binaries-darwin-amd64-signed/* artifacts/
          else
            echo "::warning::Signed darwin-amd64 binaries not found, using unsigned binaries"
            cp artifacts-all/binaries-darwin-amd64/* artifacts/
          fi

          if [ -d artifacts-all/binaries-darwin-arm64-signed ]; then
            cp artifacts-all/binaries-darwin-arm64-signed/* artifacts/
          else
            echo "::warning::Signed darwin-arm64 binaries not found, using unsigned binaries"
            cp artifacts-all/binaries-darwin-arm64/* artifacts/
          fi

          # Copy linux binaries
          cp artifacts-all/binaries-linux-amd64/* artifacts/

      - name: Generate SHA256 checksums
        working-directory: artifacts
        run: |
          for file in *; do
            sha256sum "${file}" > "${file}.sha256"
          done

      - name: Push version tag to public repo
        env:
          BOSSANOVA_PUBLIC_DEPLOY_KEY: ${{ secrets.BOSSANOVA_PUBLIC_DEPLOY_KEY }}
        run: |
          VERSION="v${{ needs.version.outputs.version }}"
          git remote add public https://x-access-token:${BOSSANOVA_PUBLIC_DEPLOY_KEY}@github.com/bossanova-dev/bossanova.git
          git fetch public production
          # Tag the public repo's stripped commit (not the private repo's commit)
          # to avoid leaking private code through the tag's commit tree
          git tag "${VERSION}" public/production
          git push public "${VERSION}"

      - name: Create GitHub Release on public repo
        env:
          GH_TOKEN: ${{ secrets.BOSSANOVA_PUBLIC_DEPLOY_KEY }}
        run: |
          gh release create "v${{ needs.version.outputs.version }}" \
            --repo bossanova-dev/bossanova \
            --title "v${{ needs.version.outputs.version }}" \
            --generate-notes \
            artifacts/*

  homebrew:
    needs: [version, release]
    if: needs.version.outputs.released == 'true'
    runs-on: ubicloud
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v8
        with:
          path: artifacts-all

      - name: Organize artifacts
        run: |
          mkdir -p artifacts
          cp artifacts-all/binaries-darwin-amd64-signed/* artifacts/ || cp artifacts-all/binaries-darwin-amd64/* artifacts/
          cp artifacts-all/binaries-darwin-arm64-signed/* artifacts/ || cp artifacts-all/binaries-darwin-arm64/* artifacts/
          cp artifacts-all/binaries-linux-amd64/* artifacts/

      - name: Generate formula
        run: |
          chmod +x infra/homebrew/generate-formula.sh
          ./infra/homebrew/generate-formula.sh "v${{ needs.version.outputs.version }}" artifacts/ > bossanova.rb

      - name: Push to Homebrew tap
        env:
          BOSSANOVA_PUBLIC_DEPLOY_KEY: ${{ secrets.BOSSANOVA_PUBLIC_DEPLOY_KEY }}
        run: |
          git clone https://x-access-token:${BOSSANOVA_PUBLIC_DEPLOY_KEY}@github.com/bossanova-dev/homebrew-tap.git tap
          mkdir -p tap/Formula
          cp bossanova.rb tap/Formula/bossanova.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/bossanova.rb
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update bossanova to v${{ needs.version.outputs.version }}"
          git push

  bump-versions:
    needs: [version, release]
    if: needs.version.outputs.released == 'true'
    runs-on: ubicloud
    steps:
      - uses: actions/checkout@v6
        with:
          ref: production
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create version marker
        run: |
          echo "v${{ needs.version.outputs.version }}" > .VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .VERSION
          git diff --staged --quiet && exit 0
          git commit -m "chore: bump version to v${{ needs.version.outputs.version }} [skip ci]"
          git push
