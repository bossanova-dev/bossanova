name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build boss
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          LDFLAGS="-s -w -X github.com/recurser/bossalib/buildinfo.Version=${VERSION} -X github.com/recurser/bossalib/buildinfo.Commit=${COMMIT} -X github.com/recurser/bossalib/buildinfo.Date=${DATE}"
          go build -ldflags "${LDFLAGS}" -o "boss-${{ matrix.goos }}-${{ matrix.goarch }}" ./services/boss/cmd

      - name: Build bossd
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          LDFLAGS="-s -w -X github.com/recurser/bossalib/buildinfo.Version=${VERSION} -X github.com/recurser/bossalib/buildinfo.Commit=${COMMIT} -X github.com/recurser/bossalib/buildinfo.Date=${DATE}"
          go build -ldflags "${LDFLAGS}" -o "bossd-${{ matrix.goos }}-${{ matrix.goarch }}" ./services/bossd/cmd

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            boss-${{ matrix.goos }}-${{ matrix.goarch }}
            bossd-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
