name: Create Production Release

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  create-release-pr:
    runs-on: ubicloud
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release name
        run: |
          TIMESTAMP=$(date +'%Y-%m-%d-%H-%M')
          echo "RELEASE_NAME=Production Release ${TIMESTAMP}" >> "$GITHUB_ENV"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base production \
            --head main \
            --title "${{ env.RELEASE_NAME }}" \
            --body "${{ env.RELEASE_NAME }}" \
            --assignee "${{ github.actor }}"
