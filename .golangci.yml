version: "2"

run:
  timeout: 5m
  exclude-dirs:
    - gen

linters:
  enable:
    - bodyclose
    - errcheck
    - exhaustive
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nolintlint
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused

  settings:
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      disabled-checks:
        - singleCaseSwitch # common Bubbletea pattern for key handling
        - ifElseChain
    gosec:
      excludes:
        - G101 # hardcoded credentials — false positives on const names
        - G112 # Slowloris — local Unix sockets and ephemeral OAuth callbacks
        - G115 # integer overflow int->int32 — intentional protobuf conversions
        - G117 # marshaled secret field — tokens stored to encrypted keyring
        - G202 # SQL concatenation — column names are controlled, not user input
        - G204 # subprocess with variable — CLI tool shells out by design
        - G301 # directory permissions 0755 — standard Unix directories
        - G302 # file permissions — socket chmod is intentional
        - G304 # file inclusion via variable — paths are from our config
        - G306 # WriteFile permissions 0644 — standard file permissions
        - G703 # path traversal — paths are from our config
        - G705 # XSS — single OAuth callback page with controlled input
    nolintlint:
      require-explanation: true
      require-specific: true
    revive:
      rules:
        - name: exported
          disabled: true # interfaces define the contract; method comments are redundant
        - name: blank-imports
          disabled: true # driver imports (e.g. modernc.org/sqlite) are idiomatic

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - prealloc

formatters:
  enable:
    - gofmt
    - goimports
