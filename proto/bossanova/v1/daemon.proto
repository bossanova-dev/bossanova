syntax = "proto3";

package bossanova.v1;

option go_package = "github.com/recurser/bossalib/gen/bossanova/v1;bossanovav1";

import "bossanova/v1/models.proto";
import "google/protobuf/timestamp.proto";

// DaemonService exposes the daemon's RPCs over a Unix socket for the boss CLI.
service DaemonService {
  // Context resolution
  rpc ResolveContext(ResolveContextRequest) returns (ResolveContextResponse);

  // Repo management
  rpc ValidateRepoPath(ValidateRepoPathRequest) returns (ValidateRepoPathResponse);
  rpc RegisterRepo(RegisterRepoRequest) returns (RegisterRepoResponse);
  rpc CloneAndRegisterRepo(CloneAndRegisterRepoRequest) returns (CloneAndRegisterRepoResponse);
  rpc ListRepos(ListReposRequest) returns (ListReposResponse);
  rpc RemoveRepo(RemoveRepoRequest) returns (RemoveRepoResponse);
  rpc UpdateRepo(UpdateRepoRequest) returns (UpdateRepoResponse);
  rpc ListRepoPRs(ListRepoPRsRequest) returns (ListRepoPRsResponse);
  rpc ListTrackerIssues(ListTrackerIssuesRequest) returns (ListTrackerIssuesResponse);

  // Session lifecycle
  rpc CreateSession(CreateSessionRequest) returns (stream CreateSessionResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc AttachSession(AttachSessionRequest) returns (stream AttachSessionResponse);
  rpc StopSession(StopSessionRequest) returns (StopSessionResponse);
  rpc PauseSession(PauseSessionRequest) returns (PauseSessionResponse);
  rpc ResumeSession(ResumeSessionRequest) returns (ResumeSessionResponse);
  rpc RetrySession(RetrySessionRequest) returns (RetrySessionResponse);
  rpc CloseSession(CloseSessionRequest) returns (CloseSessionResponse);
  rpc MergeSession(MergeSessionRequest) returns (MergeSessionResponse);
  rpc RemoveSession(RemoveSessionRequest) returns (RemoveSessionResponse);
  rpc UpdateSession(UpdateSessionRequest) returns (UpdateSessionResponse);

  // Archive / resurrect
  rpc ArchiveSession(ArchiveSessionRequest) returns (ArchiveSessionResponse);
  rpc ResurrectSession(ResurrectSessionRequest) returns (ResurrectSessionResponse);
  rpc EmptyTrash(EmptyTrashRequest) returns (EmptyTrashResponse);

  // Claude chat tracking
  rpc RecordChat(RecordChatRequest) returns (RecordChatResponse);
  rpc ListChats(ListChatsRequest) returns (ListChatsResponse);
  rpc UpdateChatTitle(UpdateChatTitleRequest) returns (UpdateChatTitleResponse);
  rpc DeleteChat(DeleteChatRequest) returns (DeleteChatResponse);

  // Chat status (cross-client heartbeat sharing)
  rpc ReportChatStatus(ReportChatStatusRequest) returns (ReportChatStatusResponse);
  rpc GetChatStatuses(GetChatStatusesRequest) returns (GetChatStatusesResponse);
  rpc GetSessionStatuses(GetSessionStatusesRequest) returns (GetSessionStatusesResponse);

  // VCS event delivery (orchestrator → daemon via webhook routing)
  rpc DeliverVCSEvent(DeliverVCSEventRequest) returns (DeliverVCSEventResponse);

  // Auth change notification (CLI → daemon)
  rpc NotifyAuthChange(NotifyAuthChangeRequest) returns (NotifyAuthChangeResponse);

  // --- Cron jobs ---

  // CreateCronJob registers a new scheduled prompt for a repo.
  rpc CreateCronJob(CreateCronJobRequest) returns (CreateCronJobResponse);

  // ListCronJobs returns cron jobs, optionally filtered by repo.
  rpc ListCronJobs(ListCronJobsRequest) returns (ListCronJobsResponse);

  // GetCronJob returns a single cron job by id.
  rpc GetCronJob(GetCronJobRequest) returns (GetCronJobResponse);

  // UpdateCronJob mutates an existing cron job. Mutable fields are optional.
  rpc UpdateCronJob(UpdateCronJobRequest) returns (UpdateCronJobResponse);

  // DeleteCronJob removes a cron job. Sessions previously spawned by it
  // have their cron_job_id reset to NULL (no cascade).
  rpc DeleteCronJob(DeleteCronJobRequest) returns (DeleteCronJobResponse);

  // RunCronJobNow fires a cron job immediately, ignoring its schedule.
  // Subject to the same overlap and concurrency-cap rules as scheduled fires.
  rpc RunCronJobNow(RunCronJobNowRequest) returns (RunCronJobNowResponse);
}

// --- Context Resolution ---

message ResolveContextRequest {
  // Working directory to resolve. If empty, uses daemon's cwd.
  string working_directory = 1;
}

message ResolveContextResponse {
  // The resolved repo, if inside a registered repo or worktree.
  optional Repo repo = 1;
  // The resolved session, if inside a session worktree.
  optional Session session = 2;
}

// --- Repo Validation ---

message ValidateRepoPathRequest {
  string local_path = 1;
}

message ValidateRepoPathResponse {
  bool is_valid = 1;           // path exists, is dir, is git repo
  string error_message = 2;    // human-readable error if not valid
  string origin_url = 3;       // detected origin remote URL
  bool is_github = 4;          // true if origin URL is github.com
  string default_branch = 5;   // detected default branch (HEAD ref)
}

// --- Repo Management ---

message RegisterRepoRequest {
  string local_path = 1;
  string display_name = 2;
  string default_base_branch = 3;
  string worktree_base_dir = 4;
  optional string setup_script = 5;
}

message RegisterRepoResponse {
  Repo repo = 1;
}

message CloneAndRegisterRepoRequest {
  string clone_url = 1;
  string local_path = 2;
  string display_name = 3;
  string default_base_branch = 4;
  string worktree_base_dir = 5;
  optional string setup_script = 6;
}

message CloneAndRegisterRepoResponse {
  Repo repo = 1;
}

message ListReposRequest {}

message ListReposResponse {
  repeated Repo repos = 1;
}

message RemoveRepoRequest {
  string id = 1;
}

message RemoveRepoResponse {}

message UpdateRepoRequest {
  string id = 1;
  optional string display_name = 2;
  optional bool can_auto_merge = 3;
  optional bool can_auto_merge_dependabot = 4;
  optional bool can_auto_address_reviews = 5;
  optional bool can_auto_resolve_conflicts = 6;
  optional string merge_strategy = 7;
  optional string setup_script = 8;
  optional string linear_api_key = 9;
  reserved 10;
}

message UpdateRepoResponse {
  Repo repo = 1;
}

message ListRepoPRsRequest {
  string repo_id = 1;
}

message ListRepoPRsResponse {
  repeated PRSummary pull_requests = 1;
}

message ListTrackerIssuesRequest {
  string repo_id = 1;
  string query = 2;
}

message ListTrackerIssuesResponse {
  repeated TrackerIssue issues = 1;
}

// --- Session Lifecycle ---

message CreateSessionRequest {
  string repo_id = 1;
  string title = 2;
  string plan = 3;
  string base_branch = 4;
  // If set, attach to an existing PR instead of creating a new one.
  optional int32 pr_number = 5;
  // If true, remove any existing branch with the same name before creating.
  bool force_branch = 6;
  // If true, run as a quick chat session (no worktree, no branch, no PR).
  bool quick_chat = 7;
  // Optional branch name (eg. from Linear's suggested branch name).
  optional string branch_name = 8;
  // External issue tracker fields.
  optional string tracker_id = 9;    // External issue ID (eg. "FRE-1176")
  optional string tracker_url = 10;  // URL to issue in external tracker
}

message CreateSessionResponse {
  oneof event {
    SetupScriptOutput setup_output = 2;
    SessionCreated session_created = 3;
  }
}

message SetupScriptOutput {
  string text = 1;
}

message SessionCreated {
  Session session = 1;
}

message GetSessionRequest {
  string id = 1;
}

message GetSessionResponse {
  Session session = 1;
}

message ListSessionsRequest {
  // Filter by repo.
  optional string repo_id = 1;
  // Filter by state.
  repeated SessionState states = 2;
  // Include archived sessions.
  bool include_archived = 3;
}

message ListSessionsResponse {
  repeated Session sessions = 1;
}

message AttachSessionRequest {
  string id = 1;
}

// AttachSessionResponse is streamed to the CLI while attached to a session.
message AttachSessionResponse {
  oneof event {
    // A line of Claude output.
    OutputLine output_line = 1;
    // Session state changed.
    StateChange state_change = 2;
    // Session ended (merged, closed, or blocked).
    SessionEnded session_ended = 3;
  }
}

message OutputLine {
  string text = 1;
  google.protobuf.Timestamp timestamp = 2;
}

message StateChange {
  SessionState previous_state = 1;
  SessionState new_state = 2;
  SessionEvent trigger = 3;
}

message SessionEnded {
  SessionState final_state = 1;
  optional string reason = 2;
}

message StopSessionRequest {
  string id = 1;
}

message StopSessionResponse {
  Session session = 1;
}

message PauseSessionRequest {
  string id = 1;
}

message PauseSessionResponse {
  Session session = 1;
}

message ResumeSessionRequest {
  string id = 1;
}

message ResumeSessionResponse {
  Session session = 1;
}

message RetrySessionRequest {
  string id = 1;
}

message RetrySessionResponse {
  Session session = 1;
}

message CloseSessionRequest {
  string id = 1;
}

message CloseSessionResponse {
  Session session = 1;
}

message MergeSessionRequest {
  string id = 1;
}

message MergeSessionResponse {
  Session session = 1;
}

message RemoveSessionRequest {
  string id = 1;
}

message RemoveSessionResponse {}

message UpdateSessionRequest {
  string id = 1;
  optional string title = 2;
}

message UpdateSessionResponse {
  Session session = 1;
}

// --- Archive / Resurrect ---

message ArchiveSessionRequest {
  string id = 1;
}

message ArchiveSessionResponse {
  Session session = 1;
}

message ResurrectSessionRequest {
  string id = 1;
}

message ResurrectSessionResponse {
  Session session = 1;
}

message EmptyTrashRequest {
  // Only empty sessions archived before this timestamp.
  optional google.protobuf.Timestamp older_than = 1;
}

message EmptyTrashResponse {
  // Number of archived sessions permanently deleted.
  int32 deleted_count = 1;
}

// --- Claude Chat Tracking ---

message RecordChatRequest {
  string session_id = 1;
  string claude_id = 2;   // Claude Code session UUID
  string title = 3;       // First user prompt or "New chat"
  // resume signals that claude_id refers to an existing Claude session that
  // should be resumed (claude --resume) rather than created fresh
  // (claude --session-id). Used by the daemon when minting the tmux session
  // host for the chat — ignored if the tmux session already exists.
  bool resume = 4;
}

message RecordChatResponse {
  ClaudeChat chat = 1;
}

message ListChatsRequest {
  string session_id = 1;
}

message ListChatsResponse {
  repeated ClaudeChat chats = 1;
}

message UpdateChatTitleRequest {
  string claude_id = 1;  // Claude Code session UUID
  string title = 2;
}

message UpdateChatTitleResponse {}

message DeleteChatRequest {
  string claude_id = 1;  // Claude Code session UUID
}

message DeleteChatResponse {}

// --- Chat Status (cross-client heartbeat sharing) ---

// ChatStatusReport is a single heartbeat from an owning client.
message ChatStatusReport {
  string claude_id = 1;        // Claude Code session UUID
  ChatStatus status = 2;       // Current process status
  google.protobuf.Timestamp last_output_at = 3; // Last PTY output time
}

message ReportChatStatusRequest {
  repeated ChatStatusReport reports = 1;
}

message ReportChatStatusResponse {}

message GetChatStatusesRequest {
  string session_id = 1;       // Fetch statuses for chats in this session
}

// ChatStatusEntry is a single chat's cached status.
message ChatStatusEntry {
  string claude_id = 1;
  ChatStatus status = 2;
  google.protobuf.Timestamp last_output_at = 3;
}

message GetChatStatusesResponse {
  repeated ChatStatusEntry statuses = 1;
}

message GetSessionStatusesRequest {
  repeated string session_ids = 1;
}

// SessionStatusEntry is an aggregate status for a session.
message SessionStatusEntry {
  string session_id = 1;
  ChatStatus status = 2;       // Best status across all chats (working > idle > stopped)
}

message GetSessionStatusesResponse {
  repeated SessionStatusEntry statuses = 1;
}

// --- VCS Event Delivery ---

message DeliverVCSEventRequest {
  // The repo this event pertains to (origin URL for matching).
  string repo_origin_url = 1;
  // The parsed VCS event.
  VCSEvent event = 2;
}

message DeliverVCSEventResponse {}

// --- Auth Change Notification ---

message NotifyAuthChangeRequest {
  string action = 1; // "login" or "logout"
}

message NotifyAuthChangeResponse {}

// --- Cron jobs ---

message CreateCronJobRequest {
  string repo_id  = 1;
  string name     = 2;
  string prompt   = 3;
  string schedule = 4;
  string timezone = 5;   // optional IANA tz; empty = daemon-local
  bool   enabled  = 6;
}

message CreateCronJobResponse {
  CronJob cron_job = 1;
}

message ListCronJobsRequest {
  // Optional repo filter. Empty returns all cron jobs across all repos.
  optional string repo_id = 1;
}

message ListCronJobsResponse {
  repeated CronJob cron_jobs = 1;
}

message GetCronJobRequest {
  string id = 1;
}

message GetCronJobResponse {
  CronJob cron_job = 1;
}

message UpdateCronJobRequest {
  string id = 1;
  optional string name     = 2;
  optional string prompt   = 3;
  optional string schedule = 4;
  optional string timezone = 5;
  optional bool   enabled  = 6;
}

message UpdateCronJobResponse {
  CronJob cron_job = 1;
}

message DeleteCronJobRequest {
  string id = 1;
}

message DeleteCronJobResponse {}

message RunCronJobNowRequest {
  string id = 1;
}

message RunCronJobNowResponse {
  // Session spawned for this manual fire. Empty if the fire was skipped
  // (overlap with a still-running session).
  optional Session session = 1;
  // Reason the fire was skipped, when session is unset.
  string skipped_reason = 2;
}
