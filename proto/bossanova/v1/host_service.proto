syntax = "proto3";

package bossanova.v1;

option go_package = "github.com/recurser/bossalib/gen/bossanova/v1;bossanovav1";

import "bossanova/v1/models.proto";

// HostService is served by the daemon and called by plugins to access VCS data.
// This enables the bidirectional gRPC pattern where the plugin can query the
// daemon's VCS provider without needing direct GitHub/GitLab credentials.
service HostService {
  // ListOpenPRs returns all open pull requests for a repository.
  rpc ListOpenPRs(ListOpenPRsRequest) returns (ListOpenPRsResponse);

  // GetCheckResults returns CI check results for a pull request.
  rpc GetCheckResults(GetCheckResultsRequest) returns (GetCheckResultsResponse);

  // GetPRStatus returns the current status of a pull request.
  rpc GetPRStatus(GetPRStatusRequest) returns (GetPRStatusResponse);

  // ListClosedPRs returns recently-closed (not merged) pull requests.
  rpc ListClosedPRs(ListClosedPRsRequest) returns (ListClosedPRsResponse);

  // --- Session & Event Management (plugin → daemon) ---

  // ListSessions returns all active sessions with hydrated display status.
  rpc ListSessions(HostServiceListSessionsRequest) returns (HostServiceListSessionsResponse);

  // GetReviewComments returns review comments on a pull request.
  rpc GetReviewComments(GetReviewCommentsRequest) returns (GetReviewCommentsResponse);

  // FireSessionEvent fires a state machine event on a session.
  rpc FireSessionEvent(FireSessionEventRequest) returns (FireSessionEventResponse);

  // SetRepairStatus sets or clears the is_repairing flag for a session.
  rpc SetRepairStatus(SetRepairStatusRequest) returns (SetRepairStatusResponse);

  // --- Agent Execution (called by repair plugin) ---

  // StartAgentRun spawns an agent run for the given session. The daemon
  // resolves the worktree path and bossd-owned log path internally and
  // forwards to the loaded AgentRunner plugin. Returns the resolved
  // session ID. Names use the "Host" suffix to avoid clashing with
  // AgentRunnerService.StartRun's StartAgentRunRequest in plugin.proto.
  rpc StartAgentRun(StartAgentRunHostRequest) returns (StartAgentRunHostResponse);

  // WaitAgentRun blocks until the named agent run exits. Returns the exit
  // error message (empty on clean exit).
  rpc WaitAgentRun(WaitAgentRunHostRequest) returns (WaitAgentRunHostResponse);

  // RecordRepairOutcome persists the result of a repair attempt onto the
  // session row so the TUI can surface "last repair: claude not in PATH (3×)"
  // hints alongside the existing display status. Called by the repair
  // plugin's deferred cleanup so every attempt — clean exit, agent error,
  // or runner-level failure — leaves a structured trace in SQLite that
  // outlives the in-memory cooldowns map.
  rpc RecordRepairOutcome(RecordRepairOutcomeRequest) returns (RecordRepairOutcomeResponse);
}

// --- ListOpenPRs ---

message ListOpenPRsRequest {
  // Repository origin URL (eg. "https://github.com/owner/repo").
  string repo_origin_url = 1;
}

message ListOpenPRsResponse {
  repeated PRSummary prs = 1;
}

// --- GetCheckResults ---

message GetCheckResultsRequest {
  // Repository origin URL.
  string repo_origin_url = 1;
  // Pull request number.
  int32 pr_number = 2;
}

message GetCheckResultsResponse {
  repeated CheckResult checks = 1;
}

// --- GetPRStatus ---

message GetPRStatusRequest {
  // Repository origin URL.
  string repo_origin_url = 1;
  // Pull request number.
  int32 pr_number = 2;
}

message GetPRStatusResponse {
  PRStatus status = 1;
}

// --- ListClosedPRs ---

message ListClosedPRsRequest {
  // Repository origin URL (eg. "https://github.com/owner/repo").
  string repo_origin_url = 1;
}

message ListClosedPRsResponse {
  repeated PRSummary prs = 1;
}

// --- ListSessions ---

// HostServiceListSessionsRequest is currently empty as it lists all sessions.
message HostServiceListSessionsRequest {}

message HostServiceListSessionsResponse {
  repeated Session sessions = 1;
}

// --- GetReviewComments ---

message GetReviewCommentsRequest {
  // Repository origin URL.
  string repo_origin_url = 1;
  // Pull request number.
  int32 pr_number = 2;
}

message GetReviewCommentsResponse {
  repeated ReviewComment comments = 1;
}

// --- FireSessionEvent ---

message FireSessionEventRequest {
  // Session ID to fire event on.
  string session_id = 1;
  // Event to fire.
  SessionEvent event = 2;
}

message FireSessionEventResponse {
  // New state after firing the event.
  string new_state = 1;
}

// --- SetRepairStatus ---

message SetRepairStatusRequest {
  // Session ID to set repair status on.
  string session_id = 1;
  // Whether the session is currently being repaired.
  bool is_repairing = 2;
}

message SetRepairStatusResponse {}

// --- StartAgentRun ---

message StartAgentRunHostRequest {
  // Session ID whose worktree should host the run.
  string session_id = 1;
  // Prompt to feed the agent.
  string prompt = 2;
}

message StartAgentRunHostResponse {
  // Resolved session ID returned by the loaded AgentRunner plugin.
  string agent_session_id = 1;
}

// --- WaitAgentRun ---

message WaitAgentRunHostRequest {
  // Session ID returned from StartAgentRun (the agent's session ID).
  string agent_session_id = 1;
}

message WaitAgentRunHostResponse {
  // Empty on clean exit, otherwise the agent's exit error string.
  string exit_error = 1;
}

// --- RecordRepairOutcome ---

message RecordRepairOutcomeRequest {
  string session_id = 1;
  // Wall-clock time of the StartAgentRun that drove this attempt.
  int64 started_at_unix = 2;
  // Non-empty when the daemon's StartAgentRun / claude plugin runner
  // refused to spawn (eg. "claude not on PATH"). Mutually exclusive with
  // exit_error in practice.
  string runner_error = 3;
  // Non-empty when the agent ran but exited non-zero / signalled.
  string exit_error = 4;
  // Agent-side session ID, useful for cross-referencing the agent log.
  string agent_session_id = 5;
}

message RecordRepairOutcomeResponse {}

