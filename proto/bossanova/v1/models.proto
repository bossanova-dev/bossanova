syntax = "proto3";

package bossanova.v1;

option go_package = "github.com/recurser/bossalib/gen/bossanova/v1;bossanovav1";

import "google/protobuf/timestamp.proto";

// SessionState represents the 12 states of the session lifecycle.
enum SessionState {
  SESSION_STATE_UNSPECIFIED = 0;
  SESSION_STATE_CREATING_WORKTREE = 1;
  SESSION_STATE_STARTING_CLAUDE = 2;
  SESSION_STATE_PUSHING_BRANCH = 3;
  SESSION_STATE_OPENING_DRAFT_PR = 4;
  SESSION_STATE_IMPLEMENTING_PLAN = 5;
  SESSION_STATE_AWAITING_CHECKS = 6;
  SESSION_STATE_FIXING_CHECKS = 7;
  SESSION_STATE_GREEN_DRAFT = 8;
  SESSION_STATE_READY_FOR_REVIEW = 9;
  SESSION_STATE_BLOCKED = 10;
  SESSION_STATE_MERGED = 11;
  SESSION_STATE_CLOSED = 12;
}

// SessionEvent represents the 15 events that trigger state transitions.
enum SessionEvent {
  SESSION_EVENT_UNSPECIFIED = 0;
  SESSION_EVENT_WORKTREE_CREATED = 1;
  SESSION_EVENT_CLAUDE_STARTED = 2;
  SESSION_EVENT_BRANCH_PUSHED = 3;
  SESSION_EVENT_PR_OPENED = 4;
  SESSION_EVENT_PLAN_COMPLETE = 5;
  SESSION_EVENT_CHECKS_PASSED = 6;
  SESSION_EVENT_CHECKS_FAILED = 7;
  SESSION_EVENT_CONFLICT_DETECTED = 8;
  SESSION_EVENT_REVIEW_SUBMITTED = 9;
  SESSION_EVENT_FIX_COMPLETE = 10;
  SESSION_EVENT_FIX_FAILED = 11;
  SESSION_EVENT_BLOCK = 12;
  SESSION_EVENT_UNBLOCK = 13;
  SESSION_EVENT_PR_MERGED = 14;
  SESSION_EVENT_PR_CLOSED = 15;
}

// CheckStatus represents the status of a CI check run.
enum CheckStatus {
  CHECK_STATUS_UNSPECIFIED = 0;
  CHECK_STATUS_QUEUED = 1;
  CHECK_STATUS_IN_PROGRESS = 2;
  CHECK_STATUS_COMPLETED = 3;
}

// CheckConclusion represents the conclusion of a completed CI check.
enum CheckConclusion {
  CHECK_CONCLUSION_UNSPECIFIED = 0;
  CHECK_CONCLUSION_SUCCESS = 1;
  CHECK_CONCLUSION_FAILURE = 2;
  CHECK_CONCLUSION_NEUTRAL = 3;
  CHECK_CONCLUSION_CANCELLED = 4;
  CHECK_CONCLUSION_SKIPPED = 5;
  CHECK_CONCLUSION_TIMED_OUT = 6;
}

// ChecksOverall represents the aggregate status of all checks on a PR.
enum ChecksOverall {
  CHECKS_OVERALL_UNSPECIFIED = 0;
  CHECKS_OVERALL_PENDING = 1;
  CHECKS_OVERALL_PASSED = 2;
  CHECKS_OVERALL_FAILED = 3;
}

// PRState represents the state of a pull request.
enum PRState {
  PR_STATE_UNSPECIFIED = 0;
  PR_STATE_OPEN = 1;
  PR_STATE_CLOSED = 2;
  PR_STATE_MERGED = 3;
}

// ReviewState represents the state of a PR review.
enum ReviewState {
  REVIEW_STATE_UNSPECIFIED = 0;
  REVIEW_STATE_APPROVED = 1;
  REVIEW_STATE_CHANGES_REQUESTED = 2;
  REVIEW_STATE_COMMENTED = 3;
  REVIEW_STATE_DISMISSED = 4;
}

// AttemptTrigger represents what triggered a fix attempt.
enum AttemptTrigger {
  ATTEMPT_TRIGGER_UNSPECIFIED = 0;
  ATTEMPT_TRIGGER_CHECK_FAILURE = 1;
  ATTEMPT_TRIGGER_CONFLICT = 2;
  ATTEMPT_TRIGGER_REVIEW_FEEDBACK = 3;
}

// AttemptResult represents the outcome of a fix attempt.
enum AttemptResult {
  ATTEMPT_RESULT_UNSPECIFIED = 0;
  ATTEMPT_RESULT_SUCCESS = 1;
  ATTEMPT_RESULT_FAILED = 2;
  ATTEMPT_RESULT_INCOMPLETE = 3;
}

// --- Domain Types ---

// Repo represents a registered Git repository.
message Repo {
  string id = 1;
  string display_name = 2;
  string local_path = 3;
  string origin_url = 4;
  string default_base_branch = 5;
  string worktree_base_dir = 6;
  optional string setup_script = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  bool can_auto_merge = 10;
  bool can_auto_merge_dependabot = 11;
  bool can_auto_address_reviews = 12;
  bool can_auto_resolve_conflicts = 13;
  string merge_strategy = 14;
  string linear_api_key = 15;
  reserved 16;
}

// Session represents a Claude coding session.
message Session {
  string id = 1;
  string repo_id = 2;
  string title = 3;
  string plan = 4;
  string worktree_path = 5;
  string branch_name = 6;
  string base_branch = 7;
  SessionState state = 8;
  optional string claude_session_id = 9;
  optional int32 pr_number = 10;
  optional string pr_url = 11;
  ChecksOverall last_check_state = 12;
  bool automation_enabled = 13;
  int32 attempt_count = 14;
  optional string blocked_reason = 15;
  optional google.protobuf.Timestamp archived_at = 16;
  google.protobuf.Timestamp created_at = 17;
  google.protobuf.Timestamp updated_at = 18;

  // Denormalized repo display name, populated server-side for convenience.
  string repo_display_name = 19;

  // PR display status, hydrated server-side from the PR display tracker.
  DisplayStatus display_status = 20;
  bool display_has_failures = 21;
  bool display_has_changes_requested = 23;

  // Attention status, hydrated server-side from session state.
  optional AttentionStatus attention_status = 22;

  // Whether this session is currently being repaired by the repair plugin.
  bool display_is_repairing = 24;

  // Workflow display fields, hydrated server-side from active workflows.
  WorkflowStatus workflow_display_status = 25;
  int32 workflow_display_leg = 26;
  int32 workflow_display_max_legs = 27;

  // Whether the session has an active Claude Code chat process (heartbeat-tracked).
  bool has_active_chat = 28;

  // External issue tracker fields (eg. Linear, Jira).
  optional string tracker_id = 29;   // External issue ID (eg. "FRE-1176")
  optional string tracker_url = 30;  // URL to issue in external tracker

  // tmux session name for persistent terminal sessions.
  optional string tmux_session_name = 31;

  // Head commit SHA of the PR, used by repair plugin to skip duplicate repairs.
  string pr_display_head_sha = 32;

  // Composite display fields, computed by bossd's DisplayStatusComputer and
  // persisted so every client (TUI, web, future consumers) renders the same
  // label/intent/spinner verbatim — including when bosso falls back to its
  // own DB while the originating bossd is offline.
  string display_label = 33;          // eg. "working", "checking", "running 2/4", "? question", "stopped"
  DisplayIntent display_intent = 34;  // semantic meaning; clients map to styling
  bool display_spinner = 35;          // whether to render the spinner glyph

  // Transfer coordination markers used by the coordinated TransferSession
  // protocol (see docs/plans/2026-04-24-reverse-stream-daemon-model.md,
  // decision #14). When set, the session is hidden from ListForUser on the
  // orchestrator until the transfer protocol completes.
  string transferring_to = 36;    // empty if not transferring out
  string transferring_from = 37;  // empty if not transferring in
}

// DisplayIntent represents the semantic meaning of a session's display
// status. Clients map intent to styling (color, weight, etc.) — the proto
// itself stays presentation-agnostic.
enum DisplayIntent {
  DISPLAY_INTENT_UNSPECIFIED = 0;
  DISPLAY_INTENT_SUCCESS = 1;
  DISPLAY_INTENT_WARNING = 2;
  DISPLAY_INTENT_DANGER = 3;
  DISPLAY_INTENT_MUTED = 4;
  DISPLAY_INTENT_INFO = 5;
}

// Attempt represents a fix attempt within a session.
message Attempt {
  string id = 1;
  string session_id = 2;
  AttemptTrigger trigger = 3;
  AttemptResult result = 4;
  optional string error = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

// --- VCS-Agnostic Types ---

// PRStatus represents the current status of a pull request.
message PRStatus {
  PRState state = 1;
  optional bool mergeable = 2;
  string title = 3;
  string head_branch = 4;
  string base_branch = 5;
}

// CheckResult represents the result of a single CI check.
message CheckResult {
  string id = 1;
  string name = 2;
  CheckStatus status = 3;
  optional CheckConclusion conclusion = 4;
}

// ReviewComment represents a review comment on a PR.
message ReviewComment {
  string author = 1;
  string body = 2;
  ReviewState state = 3;
  optional string path = 4;
  optional int32 line = 5;
}

// PRSummary is a lightweight representation of a PR for listing.
message PRSummary {
  int32 number = 1;
  string title = 2;
  string head_branch = 3;
  PRState state = 4;
  string author = 5;
}

// CreatePROpts contains options for creating a new pull request.
message CreatePROpts {
  string repo_path = 1;
  string head_branch = 2;
  string base_branch = 3;
  string title = 4;
  string body = 5;
  bool draft = 6;
}

// PRInfo is the result of creating a pull request.
message PRInfo {
  int32 number = 1;
  string url = 2;
}

// TrackerIssue represents an issue from an external tracker (Linear, Jira, etc.).
message TrackerIssue {
  string external_id = 1;      // eg. "ENG-123"
  string title = 2;
  string description = 3;
  string branch_name = 4;       // Suggested branch name from tracker
  string url = 5;               // Link to issue in tracker
  string state = 6;             // eg. "In Progress", "Todo"
  int32 pr_number = 7;          // Existing PR if found (0 = none)
  string existing_branch = 8;   // Existing branch if found
}

// --- VCS Events ---

// VCSEvent wraps all possible VCS events in a oneof.
message VCSEvent {
  oneof event {
    ChecksPassedEvent checks_passed = 1;
    ChecksFailedEvent checks_failed = 2;
    ConflictDetectedEvent conflict_detected = 3;
    ReviewSubmittedEvent review_submitted = 4;
    PRMergedEvent pr_merged = 5;
    PRClosedEvent pr_closed = 6;
  }
}

message ChecksPassedEvent {
  int32 pr_id = 1;
}

message ChecksFailedEvent {
  int32 pr_id = 1;
  repeated CheckResult failed_checks = 2;
}

message ConflictDetectedEvent {
  int32 pr_id = 1;
}

message ReviewSubmittedEvent {
  int32 pr_id = 1;
  repeated ReviewComment comments = 2;
}

message PRMergedEvent {
  int32 pr_id = 1;
}

message PRClosedEvent {
  int32 pr_id = 1;
}

// AttentionReason represents why a session needs human attention.
enum AttentionReason {
  ATTENTION_REASON_UNSPECIFIED = 0;
  ATTENTION_REASON_BLOCKED_MAX_ATTEMPTS = 1;
  ATTENTION_REASON_AWAITING_HUMAN_INPUT = 2;
  ATTENTION_REASON_REVIEW_REQUESTED = 3;
  ATTENTION_REASON_MERGE_CONFLICT_UNRESOLVABLE = 4;
}

// AttentionStatus represents whether and why a session needs human attention.
message AttentionStatus {
  bool needs_attention = 1;
  AttentionReason reason = 2;
  string summary = 3;
  google.protobuf.Timestamp since = 4;
}

// DisplayStatus represents the unified display status for a session in the TUI.
enum DisplayStatus {
  DISPLAY_STATUS_UNSPECIFIED = 0;
  DISPLAY_STATUS_IDLE = 1;
  DISPLAY_STATUS_CHECKING = 2;
  DISPLAY_STATUS_FAILING = 3;
  DISPLAY_STATUS_CONFLICT = 4;
  DISPLAY_STATUS_REJECTED = 5;
  DISPLAY_STATUS_PASSING = 6;
  DISPLAY_STATUS_MERGED = 7;
  DISPLAY_STATUS_CLOSED = 8;
  DISPLAY_STATUS_DRAFT = 9;
  DISPLAY_STATUS_APPROVED = 10;
}

// WorkflowStatus represents the lifecycle state of an autopilot workflow.
enum WorkflowStatus {
  WORKFLOW_STATUS_UNSPECIFIED = 0;
  WORKFLOW_STATUS_PENDING = 1;
  WORKFLOW_STATUS_RUNNING = 2;
  WORKFLOW_STATUS_PAUSED = 3;
  WORKFLOW_STATUS_COMPLETED = 4;
  WORKFLOW_STATUS_FAILED = 5;
  WORKFLOW_STATUS_CANCELLED = 6;
}

// WorkflowStep represents the current step in the autopilot skill sequence.
enum WorkflowStep {
  WORKFLOW_STEP_UNSPECIFIED = 0;
  WORKFLOW_STEP_PLAN = 1;
  WORKFLOW_STEP_IMPLEMENT = 2;
  WORKFLOW_STEP_HANDOFF = 3;
  WORKFLOW_STEP_RESUME = 4;
  WORKFLOW_STEP_VERIFY = 5;
  WORKFLOW_STEP_LAND = 6;
}

// ChatStatus represents the live status of a Claude Code chat process.
enum ChatStatus {
  CHAT_STATUS_UNSPECIFIED = 0;
  CHAT_STATUS_WORKING = 1;
  CHAT_STATUS_IDLE = 2;
  CHAT_STATUS_STOPPED = 3;
  CHAT_STATUS_QUESTION = 4;
}

// ClaudeChat represents a Claude Code conversation associated with a session.
message ClaudeChat {
  string id = 1;
  string session_id = 2;
  string claude_id = 3;          // Claude Code session UUID
  string title = 4;              // First user prompt or "New chat"
  string daemon_id = 5;          // Originating daemon (empty = local)
  google.protobuf.Timestamp created_at = 6;
}
