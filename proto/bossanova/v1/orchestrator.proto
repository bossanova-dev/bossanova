syntax = "proto3";

package bossanova.v1;

option go_package = "github.com/recurser/bossalib/gen/bossanova/v1;bossanovav1";

import "bossanova/v1/daemon.proto";
import "bossanova/v1/models.proto";
import "google/protobuf/timestamp.proto";

// OrchestratorService is the cloud-hosted service that coordinates multiple
// daemons, provides remote CLI access, and handles webhook routing.
service OrchestratorService {
  // Daemon registry
  rpc RegisterDaemon(RegisterDaemonRequest) returns (RegisterDaemonResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc ListDaemons(ListDaemonsRequest) returns (ListDaemonsResponse);

  // Session transfer between daemons
  rpc TransferSession(TransferSessionRequest) returns (TransferSessionResponse);

  // Proxied daemon RPCs (remote CLI → orchestrator → daemon)
  rpc ProxyListSessions(ProxyListSessionsRequest) returns (ProxyListSessionsResponse);
  rpc ProxyGetSession(ProxyGetSessionRequest) returns (ProxyGetSessionResponse);
  rpc ProxyAttachSession(ProxyAttachSessionRequest) returns (stream ProxyAttachSessionResponse);
  rpc ProxyStopSession(ProxyStopSessionRequest) returns (ProxyStopSessionResponse);
  rpc ProxyPauseSession(ProxyPauseSessionRequest) returns (ProxyPauseSessionResponse);
  rpc ProxyResumeSession(ProxyResumeSessionRequest) returns (ProxyResumeSessionResponse);
}

// --- Daemon Registry ---

message RegisterDaemonRequest {
  string daemon_id = 1;
  string hostname = 2;
  // Repos this daemon manages.
  repeated string repo_ids = 3;
  // Optional endpoint URL where the daemon's DaemonService is reachable.
  // Required for proxy RPC support. Daemons behind NAT may omit this.
  optional string endpoint = 4;
}

message RegisterDaemonResponse {
  string daemon_id = 1;
  // Token for subsequent authenticated requests.
  string session_token = 2;
}

message HeartbeatRequest {
  string daemon_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  // Active session count for load info.
  int32 active_sessions = 3;
}

message HeartbeatResponse {}

message ListDaemonsRequest {}

message DaemonInfo {
  string daemon_id = 1;
  string hostname = 2;
  repeated string repo_ids = 3;
  int32 active_sessions = 4;
  google.protobuf.Timestamp last_heartbeat = 5;
  bool online = 6;
}

message ListDaemonsResponse {
  repeated DaemonInfo daemons = 1;
}

// --- Session Transfer ---

message TransferSessionRequest {
  string session_id = 1;
  // Daemon to transfer FROM.
  string source_daemon_id = 2;
  // Daemon to transfer TO.
  string target_daemon_id = 3;
}

message TransferSessionResponse {
  Session session = 1;
  string target_daemon_id = 2;
}

// --- Proxied Daemon RPCs ---
// These mirror DaemonService RPCs but route through the orchestrator
// to the appropriate daemon. Each has its own request/response types
// to satisfy buf lint uniqueness requirements.

message ProxyListSessionsRequest {
  optional string repo_id = 1;
  repeated SessionState states = 2;
  bool include_archived = 3;
  // Target daemon, if known. Otherwise orchestrator queries all.
  optional string daemon_id = 4;
}

message ProxyListSessionsResponse {
  repeated Session sessions = 1;
}

message ProxyGetSessionRequest {
  string id = 1;
}

message ProxyGetSessionResponse {
  Session session = 1;
}

message ProxyAttachSessionRequest {
  string id = 1;
}

// ProxyAttachSessionResponse is streamed from orchestrator to remote CLI.
// Reuses the streaming event types defined in daemon.proto.
message ProxyAttachSessionResponse {
  oneof event {
    OutputLine output_line = 1;
    StateChange state_change = 2;
    SessionEnded session_ended = 3;
  }
}

message ProxyStopSessionRequest {
  string id = 1;
}

message ProxyStopSessionResponse {
  Session session = 1;
}

message ProxyPauseSessionRequest {
  string id = 1;
}

message ProxyPauseSessionResponse {
  Session session = 1;
}

message ProxyResumeSessionRequest {
  string id = 1;
}

message ProxyResumeSessionResponse {
  Session session = 1;
}
