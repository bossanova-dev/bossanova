syntax = "proto3";

package bossanova.v1;

option go_package = "github.com/recurser/bossalib/gen/bossanova/v1;bossanovav1";

import "bossanova/v1/daemon.proto";
import "bossanova/v1/models.proto";
import "google/protobuf/timestamp.proto";

// OrchestratorService is the cloud-hosted service that coordinates multiple
// daemons, provides remote CLI access, and handles webhook routing.
service OrchestratorService {
  // Daemon registry
  rpc RegisterDaemon(RegisterDaemonRequest) returns (RegisterDaemonResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc ListDaemons(ListDaemonsRequest) returns (ListDaemonsResponse);
  rpc SyncSessions(SyncSessionsRequest) returns (SyncSessionsResponse);

  // Session transfer between daemons
  rpc TransferSession(TransferSessionRequest) returns (TransferSessionResponse);

  // Proxied daemon RPCs (remote CLI → orchestrator → daemon)
  rpc ProxyListSessions(ProxyListSessionsRequest) returns (ProxyListSessionsResponse);
  rpc ProxyGetSession(ProxyGetSessionRequest) returns (ProxyGetSessionResponse);
  rpc ProxyAttachSession(ProxyAttachSessionRequest) returns (stream ProxyAttachSessionResponse);
  rpc ProxyStopSession(ProxyStopSessionRequest) returns (ProxyStopSessionResponse);
  rpc ProxyPauseSession(ProxyPauseSessionRequest) returns (ProxyPauseSessionResponse);
  rpc ProxyResumeSession(ProxyResumeSessionRequest) returns (ProxyResumeSessionResponse);

  // Webhook configuration management
  rpc CreateWebhookConfig(CreateWebhookConfigRequest) returns (CreateWebhookConfigResponse);
  rpc ListWebhookConfigs(ListWebhookConfigsRequest) returns (ListWebhookConfigsResponse);
  rpc DeleteWebhookConfig(DeleteWebhookConfigRequest) returns (DeleteWebhookConfigResponse);

  // Bug reporting (easter-egg ctrl+b in TUI). Unauthenticated; optionally
  // resolves the caller's identity when a bearer token is present.
  rpc ReportBug(ReportBugRequest) returns (ReportBugResponse);
}

// --- Daemon Registry ---

message RegisterDaemonRequest {
  string daemon_id = 1;
  string hostname = 2;
  // Repos this daemon manages.
  repeated string repo_ids = 3;
  // Optional endpoint URL where the daemon's DaemonService is reachable.
  // Required for proxy RPC support. Daemons behind NAT may omit this.
  optional string endpoint = 4;
  // User email from the WorkOS device code response.
  // Used for JIT user creation when the user doesn't exist in the DB yet.
  string email = 5;
}

message RegisterDaemonResponse {
  string daemon_id = 1;
  // Token for subsequent authenticated requests.
  string session_token = 2;
}

message HeartbeatRequest {
  string daemon_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  // Active session count for load info.
  int32 active_sessions = 3;
}

message HeartbeatResponse {}

message ListDaemonsRequest {}

message DaemonInfo {
  string daemon_id = 1;
  string hostname = 2;
  repeated string repo_ids = 3;
  int32 active_sessions = 4;
  google.protobuf.Timestamp last_heartbeat = 5;
  bool online = 6;
}

message ListDaemonsResponse {
  repeated DaemonInfo daemons = 1;
}

message SyncSessionsRequest {
  string daemon_id = 1;
  repeated Session sessions = 2;
}

message SyncSessionsResponse {}

// --- Session Transfer ---

message TransferSessionRequest {
  string session_id = 1;
  // Daemon to transfer FROM.
  string source_daemon_id = 2;
  // Daemon to transfer TO.
  string target_daemon_id = 3;
}

message TransferSessionResponse {
  Session session = 1;
  string target_daemon_id = 2;
}

// --- Proxied Daemon RPCs ---
// These mirror DaemonService RPCs but route through the orchestrator
// to the appropriate daemon. Each has its own request/response types
// to satisfy buf lint uniqueness requirements.

message ProxyListSessionsRequest {
  optional string repo_id = 1;
  repeated SessionState states = 2;
  bool include_archived = 3;
  // Target daemon, if known. Otherwise orchestrator queries all.
  optional string daemon_id = 4;
}

message ProxyListSessionsResponse {
  repeated Session sessions = 1;
  // Field 2 (`chat_statuses`) was removed when clients stopped composing
  // their own status — `Session.display_label/intent/spinner` now carries
  // the rendered state directly. Tag reserved to prevent reuse.
  reserved 2;
  reserved "chat_statuses";
}

message ProxyGetSessionRequest {
  string id = 1;
}

message ProxyGetSessionResponse {
  Session session = 1;
}

message ProxyAttachSessionRequest {
  string id = 1;
}

// ProxyAttachSessionResponse is streamed from orchestrator to remote CLI.
// Reuses the streaming event types defined in daemon.proto.
message ProxyAttachSessionResponse {
  oneof event {
    OutputLine output_line = 1;
    StateChange state_change = 2;
    SessionEnded session_ended = 3;
  }
}

message ProxyStopSessionRequest {
  string id = 1;
}

message ProxyStopSessionResponse {
  Session session = 1;
}

message ProxyPauseSessionRequest {
  string id = 1;
}

message ProxyPauseSessionResponse {
  Session session = 1;
}

message ProxyResumeSessionRequest {
  string id = 1;
}

message ProxyResumeSessionResponse {
  Session session = 1;
}

// --- Webhook Configuration ---

message WebhookConfig {
  string id = 1;
  // The repository origin URL this webhook is for (e.g. "https://github.com/owner/repo").
  string repo_origin_url = 2;
  // VCS provider type: "github", "gitlab", etc.
  string provider = 3;
  // HMAC secret for signature verification.
  string secret = 4;
  google.protobuf.Timestamp created_at = 5;
}

message CreateWebhookConfigRequest {
  string repo_origin_url = 1;
  string provider = 2;
  // If empty, a random secret will be generated.
  string secret = 3;
}

message CreateWebhookConfigResponse {
  WebhookConfig config = 1;
}

message ListWebhookConfigsRequest {}

message ListWebhookConfigsResponse {
  repeated WebhookConfig configs = 1;
}

message DeleteWebhookConfigRequest {
  string id = 1;
}

message DeleteWebhookConfigResponse {}

// --- Bug reporting ---

message ReportBugRequest {
  string comment = 1;
  ReportContext context = 2;
}

message ReportBugResponse {
  string report_id = 1;
}

// ReportContext bundles everything the TUI attaches to a bug report.
// All fields are optional; the server tolerates empty values.
message ReportContext {
  // Client identity
  string boss_version = 1;
  string boss_commit = 2;
  string os = 3;
  string arch = 4;
  string terminal = 5;

  // Session state at report time.
  Session current_session = 6;
  repeated SessionSummary sessions = 7;
  map<string, string> daemon_statuses = 8;

  // Tailed log contents (last N lines each).
  string boss_log_tail = 9;
  string bossd_log_tail = 10;

  // Optionally populated — most recent Claude turns, if available.
  repeated ClaudeTurn recent_turns = 11;
}

// SessionSummary is a lightweight view of a Session for report context.
message SessionSummary {
  string id = 1;
  string repo_id = 2;
  string title = 3;
  SessionState state = 4;
  optional int32 pr_number = 5;
  optional string pr_url = 6;
  google.protobuf.Timestamp updated_at = 7;
}

// ClaudeTurn is a single turn from a recent Claude conversation.
message ClaudeTurn {
  // "user" or "assistant".
  string role = 1;
  string content = 2;
  google.protobuf.Timestamp timestamp = 3;
}
